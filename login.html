<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RuralCare BD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #008080; 
            --primary-dark: #004c4c;
            --bg-color: #73dc76;
            --text-main: #333;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh;}

        .btn {
            background-color: var(--primary-color); color: var(--white); padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; transition: 0.3s; text-decoration: none; text-align: center;
        }
        .btn:hover { background-color: var(--primary-dark); }
        .btn-outline { background-color: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); }
        .btn-outline:hover { background-color: var(--primary-color); color: var(--white); }
        .btn-block { width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; display: block;}

        .login-container { background: var(--white); padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h2 { color: var(--primary-dark); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-main); }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: #f9f9f9; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Please log in to your account</p>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Select User Role</label>
                <select id="userRole" required>
                    <option value="" disabled selected>Choose your role...</option>
                    <option value="Patient">Patient (রোগী)</option>
                    <option value="Doctor">Doctor (ডাক্তার)</option>
                    <option value="Nurse">Nurse (নার্স)</option>
                    <option value="CHW">Community Health Worker (স্বাস্থ্যকর্মী)</option>
                    <option value="Clinic">Clinic Management (ক্লিনিক)</option>
                    <option value="DHA">District Health Authority (DHA)</option>
                    <option value="Govt">Government (মন্ত্রণালয়)</option>
                    <option value="Admin">System Admin (অ্যাডমিন)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Username or ID</label>
                <input type="text" id="username" placeholder="Enter ID" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="btn btn-block">Login</button>
            <a href="Index.html" class="btn btn-block btn-outline">Back to Home</a>
        </form>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const role = document.getElementById('userRole').value;
            const username = document.getElementById('username').value;
            
            if(!role) { alert("Please select a user role!"); return; }

            // Save login data to localStorage to pass it to the dashboard
            localStorage.setItem('ruralUserRole', role);
            localStorage.setItem('ruralUserName', username);
            
            // Redirect based on selected user role
            let targetPage = "";

            switch(role) {
                case "Patient":
                    targetPage = "Book Appointment.html"; 
                    break;
                case "Doctor":
                    targetPage = "Doctor.html"; // আপনার ডাক্তারের ফাইলের লিংক দিন
                    break;
                case "Nurse":
                    targetPage = "nurse.html"; // আপনার নার্সের ফাইলের লিংক দিন
                    break;
                case "CHW":
                    targetPage = "CHW.html"; // স্বাস্থ্যকর্মীর ফাইলের লিংক দিন
                    break;
                case "Clinic":
                    targetPage = "Clinic management.html"; // ক্লিনিকের ফাইলের লিংক দিন
                    break;
                case "DHA":
                    targetPage = "dha_dashboard.html"; // DHA এর ফাইলের লিংক দিন
                    break;
                case "Govt":
                    targetPage = "govt_dashboard.html"; // মন্ত্রণালয়ের ফাইলের লিংক দিন
                    break;
                case "Admin":
                    targetPage = "Admin.html"; // অ্যাডমিন ফাইলের লিংক দিন
                    break;
                default:
                    targetPage = "index.html";
            }

            // Redirect to the specific dashboard
            window.location.href = targetPage;
        }
    </script>
</body>
</html>
